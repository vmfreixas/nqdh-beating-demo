name: nqdh-demo
# Minimal environment to run the builtin (Libra-free) path:
#   conda env create -f environment.yml && conda activate nqdh-demo
#
# The featured --engine libra path additionally needs Libra (a school-provided
# source build). Run that path inside your Libra conda env, which must ALSO have
# torch + hippynn installed (they load the model); see README "Running · Libra".
channels:
  - conda-forge
  - pytorch
dependencies:
  - python=3.11
  - numpy
  - scipy
  - matplotlib
  - h5py            # only needed for the Libra path (reads its HDF5 output)
  - pytorch>=2.1
  - pip
  - pip:
      - hippynn>=0.1   # evaluates the frozen NQDH graph (W(R), dW/dR)
